# =============================================================================
# LAB04 Infra Deploy - Terraform plan + apply
# =============================================================================
# Manual run. State: lab04.tfstate

name: Lab04 Infra Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for Azure OIDC federation

env:
  TF_DIR: lab04-secure-hub-spoke-fintech/infrastructure/terraform/root
  TF_VARS_FILE: ../tfvars/lab04.tfvars

# -----------------------------------------------------------------------------
# Jobs: Plan (always) -> Apply (only if plan has changes)
# -----------------------------------------------------------------------------
jobs:
  plan:
    name: Plan Infra
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      # Backend: vars for storage identifiers; key derived from environment
      TF_BACKEND_RG_NAME: ${{ vars.TF_BACKEND_RG_NAME }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ vars.TF_BACKEND_CONTAINER }}
      # State key: lab04.tfstate
      TF_BACKEND_KEY: lab04.tfstate

    outputs:
      changes_present: ${{ steps.plan.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RG_NAME" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          terraform plan -var-file="$TF_VARS_FILE" -out=tfplan
          CHANGES=$(terraform show -json tfplan | jq '[.resource_changes[]? | select(.change.actions[]? != "no-op")] | length > 0')
          echo "has_changes=$CHANGES" >> "$GITHUB_OUTPUT"

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-artifact
          path: ${{ env.TF_DIR }}/tfplan

  # Apply runs only when plan reports changes
  apply:
    name: Deploy Infra
    runs-on: ubuntu-latest
    needs: plan
    if: success() && needs.plan.outputs.changes_present == 'true'

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      TF_BACKEND_RG_NAME: ${{ vars.TF_BACKEND_RG_NAME }}
      TF_BACKEND_STORAGE_ACCOUNT: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
      TF_BACKEND_CONTAINER: ${{ vars.TF_BACKEND_CONTAINER }}
      TF_BACKEND_KEY: lab04.tfstate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-artifact

      - name: Place plan in Terraform root
        run: mkdir -p "${{ env.TF_DIR }}" && mv tfplan "${{ env.TF_DIR }}/tfplan"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_BACKEND_RG_NAME" \
            -backend-config="storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_BACKEND_CONTAINER" \
            -backend-config="key=$TF_BACKEND_KEY"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: terraform apply -auto-approve tfplan
